<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Meta -->
    <meta charset="UTF-8"> <!--UTF-8 utilizado para codificação de caracteres-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Responsividade-->

    <!-- Adicionados para gerenciar meta dados da página HTML -->
    <!-- Descrição para o motor de busca -->
    <meta name="description" content="Site para registro de progressão de carga voltado para praticantes de academia">

    <!-- Força navegador emular utilizando o motor mais moderno possível -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--Palavras chaves para o site ser encontrado-->
    <meta name="keywords" content="academia, gym, myGym, progressão de carga, ">
    <!-- Titúlo do site -->
    <title>My Gym</title>

    <!-- Style CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- CDN phosphor para olho da senha -->
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

</head>

<body>
    <div class="container_login">
        <img src="assets/logo_mygym.png" title="my gym logo" alt="Logo do my gym">
        <div class="content_data">
            <h1>Bem vindo de volta</h1>
            <p class="credenciais">Por favor, coloque suas credenciais</p>

            <div class="form">
                <div class="form_input">
                    <p for="email">Email</p>
                    <input type="text" id="ipt_mail">
                </div>
                <div class="form_input">
                    <p for="password">Senha</p>
                    <div class="content_pass">
                        <input type="password" id="ipt_pass">
                        <i class="ph ph-eye" id="icon_pass" onclick="showPass('ipt_pass', 'icon_pass')"></i>
                    </div>
                </div>
                <div class="response" id="div_response">
                    <p id="error_response"></p>
                </div>
                <div class="content_button">
                    <button class="button" onclick="makeLogin()">Login</button>
                    <p>Não tem conta? <a class="highlight_color" href="register.html">Regitre-se agora</a></p>
                    <i class="ph ph-eye" style="font-size: 50px; color: white;"></i>
                </div>
            </div>

            <p class="copyright">copyright © 2026 | GITHUB: viniciusfariac</p>
        </div>
    </div>
    <div class="container_image">
        <img src="assets/imagem_capa_login.jpg" title="Imagem de halteres" alt="Imagem de halteres">
    </div>
</body>

</html>
<script src="js/animation.js"></script>
<script src="js/validation.js"></script>

<script>
    function makeLogin() {
        // Declarando as variáveis
        let mail = ipt_mail.value
        let pass = ipt_pass.value

        // Validação de estrutura de email, com ponto e arroba
        if (validating_mail(mail)) {
            div_response.style.display = "block"
            error_response.innerHTML = "Digite uma estrutura de email válida"
            return false
        }

        // Validação de senha
        if (validating_pass(pass)) {
            div_response.style.display = "block"
            error_response.innerHTML = "Senha precisa ter: 8 caracteres, numeros, letra maiúscula, letra minúscula, caracter especial e não pode repetir caracter junto"
            return false
        }

        // Aplicando display none se tudo estiver correto
        div_response.style.display = "none"

        console.log("FORM LOGIN: ", mail);
        console.log("FORM SENHA: ", pass);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: mail,
                senhaServer: pass
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./dashboard/teste.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
