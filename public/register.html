<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Meta -->
    <meta charset="UTF-8"> <!--UTF-8 utilizado para codificação de caracteres-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Responsividade-->

    <!-- Adicionados para gerenciar meta dados da página HTML -->
    <!-- Descrição para o motor de busca -->
    <meta name="description" content="Site para registro de progressão de carga voltado para praticantes de academia">

    <!-- Força navegador emular utilizando o motor mais moderno possível -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--Palavras chaves para o site ser encontrado-->
    <meta name="keywords" content="academia, gym, myGym, progressão de carga, ">
    <!-- Titúlo do site -->
    <title>My Gym</title>

    <!-- Style CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- CDN phosphor para olho da senha -->
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

</head>

<body>
    <div class="container_login">
        <img src="assets/logo_mygym.png" title="my gym logo" alt="Logo do my gym">
        <div class="content_data">
            <h1>Bem vindo de volta</h1>
            <p class="credenciais">Por favor, coloque suas credenciais</p>

            <div class="form">
                <div class="form_input">
                    <p for="email">Nome</p>
                    <input type="text" id="ipt_name">
                </div>
                <div class="form_input">
                    <p for="password">Email</p>
                    <input type="text" id="ipt_mail">
                </div>
                <div class="form_input">
                    <p for="password">Senha</p>
                    <div class="content_pass">
                        <input type="password" id="ipt_pass">
                        <i class="ph ph-eye" id="icon_pass" onclick="showPass('ipt_pass', 'icon_pass')"></i>
                    </div>
                </div>
                <div class="form_input">
                    <p for="password">Confirmar senha</p>
                    <div class="content_pass">
                        <input type="password" id="ipt_confirm_pass">
                        <i class="ph ph-eye" id="icon_confirm"
                            onclick="showPass('ipt_confirm_pass', 'icon_confirm')"></i>
                    </div>
                </div>
                <div class="response" id="div_response">
                    <p id="error_response"></p>
                </div>
                <div class="content_button">
                    <button class="button" onclick="makeLogin()">Cadastrar-se</button>
                    <p>Já tem uma conta? <a class="highlight_color" href="login.html">Entre agora</a></p>
                </div>

            </div>

            <p class="copyright">copyright © 2026 | GITHUB: viniciusfariac</p>
        </div>
    </div>
    <div class="container_image">
        <img src="assets/imagem_capa_login.jpg" title="Imagem de halteres" alt="Imagem de halteres">
    </div>
</body>

</html>

<script src="js/validation.js"></script>
<script src="js/animation.js"></script>

<script>
    function makeLogin() {
        // Declarando as variáveis
        let full_name = ipt_name.value
        let mail = ipt_mail.value
        let pass = ipt_pass.value
        let confirm_pass = ipt_confirm_pass.value

        // Verificação de campos em branco
        if (validating_blank_field(full_name, mail, pass, confirm_pass)) {
            div_response.style.display = "block"
            error_response.innerHTML = "Todos os campos precisam estar preenchidos"
            return false
        }

        // Verificação de nome para até 3 caracteres
        if (validating_name(full_name)) {
            div_response.style.display = "block"
            error_response.innerHTML = "O campo nome deve ter pelo menos 3 caracteres"
            return false
        }

        // Validação de estrutura de email, com ponto e arroba
        if (validating_mail(mail)) {
            div_response.style.display = "block"
            error_response.innerHTML = "Digite uma estrutura de email válida"
            return false
        }

        // Validação de senha
        if (validating_pass(pass)) {
            div_response.style.display = "block"
            error_response.innerHTML = "Senha precisa ter: 8 caracteres, numeros, letra maiúscula, letra minúscula, caracter especial e não pode repetir caracter junto"
            return false
        }

        // Conferindo se as senhas coincidem
        if (validating_confirm_pass(pass, confirm_pass)) {
            div_response.style.display = "block"
            error_response.innerHTML = "As senhas precisam coincidir"
            return false
        }

        // Validando se a senha não tem o nome do usuário
        let pass_name = validating_pass_name(pass, full_name)
        if (pass_name.length > 0) {
            div_response.style.display = "block"
            error_response.innerHTML = `A senha não pode ter parte do seu nome, como por exemplo: ${pass_name}`
            return false
        }

        // Aplicando display none se tudo estiver correto
        div_response.style.display = "none"

        // Enviando o valor da nova input
        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                nomeServer: full_name,
                emailServer: mail,
                senhaServer: pass
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    div_response.style.display = "none";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }

</script>
